<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vastra Luxe Pro</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {margin:0;font-family:Arial;background:#faf7f5;}
header {display:flex;justify-content:space-between;padding:20px;background:#111;color:#fff;}
nav a {color:#fff;margin:0 10px;text-decoration:none;}
.hero {height:60vh;background:#333;color:#fff;display:flex;align-items:center;justify-content:center;}
.products {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:30px;}
.card {background:#fff;padding:15px;border-radius:10px;text-align:center;}
button {padding:10px;background:black;color:#fff;border:none;cursor:pointer;}
#cartBtn {position:fixed;right:20px;bottom:20px;background:#a67c52;padding:15px;border-radius:50%;color:#fff;}
#cartBox {position:fixed;right:20px;bottom:80px;width:280px;background:#fff;padding:15px;border:1px solid #ccc;display:none;}
input {width:100%;padding:8px;margin:5px 0;}
</style>
</head>

<body>

<header>
<h2>Vastra Luxe Pro</h2>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Login</a>
</nav>
</header>

<section class="hero">
<h1>Premium Sarees & Dresses</h1>
</section>

<div class="products" id="products"></div>

<div id="cartBtn" onclick="toggleCart()">🛒</div>

<div id="cartBox">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p id="total"></p>
<button onclick="payNow()">Pay Now</button>
</div>

<script>
let cart=[];

// SAMPLE PRODUCTS (can be replaced with backend later)
const products=[
{name:"Silk Saree",price:7999,image:"https://images.unsplash.com/photo-1622296089863-eb7fc530daa8"},
{name:"Evening Dress",price:5999,image:"https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03"},
{name:"Designer Saree",price:9999,image:"https://images.unsplash.com/photo-1610030469998-2b0cb63fdc67"}
];

function loadProducts(){
let container=document.getElementById("products");
products.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}" width="100%">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
</div>`;
});
}

loadProducts();

function addToCart(name,price){
cart.push({name,price});
alert("Added to cart");
}

function toggleCart(){
let box=document.getElementById("cartBox");
box.style.display=box.style.display==="block"?"none":"block";
renderCart();
}

function renderCart(){
let list=document.getElementById("cartItems");
let total=0;
list.innerHTML="";
cart.forEach(i=>{
list.innerHTML+=`<li>${i.name} - ₹${i.price}</li>`;
total+=i.price;
});
document.getElementById("total").innerText="Total: ₹"+total;
}

function payNow(){
let total=cart.reduce((sum,i)=>sum+i.price,0);

let options={
key:"YOUR_KEY_ID",
amount:total*100,
currency:"INR",
name:"Vastra Luxe",
description:"Order Payment",
handler:function(){
alert("Payment Successful!");
}
};

let rzp=new Razorpay(options);
rzp.open();
}
</script>

</body>
</html>
